<!doctype html>
<html lang="ur">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>خاندانی درخت - Family Tree</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="header-shell">
      <header class="topbar">
        <div class="header-title">🌳 خاندانی درخت - Family Tree</div>
      </header>

      <nav class="topnav" aria-label="Pages">
        <a class="nav-link active" href="./index.html">ہوم</a>
        <a class="nav-link" href="./about.html">تعارف</a>
        <a class="nav-link" href="./contact.html">رابطہ</a>
      </nav>
    </div>

    <main class="container">
      <section class="hint">
        <div>
          اپنے خاندان کے ڈیٹا کو تبدیل کرنے کے لیے `app.js` میں `PEOPLE` اور `ROOT_ID` کو edit کریں۔
        </div>
      </section>

      <section class="tree-wrap">
        <div id="treeRoot" class="tree" aria-label="Family tree"></div>
      </section>
    </main>

    <nav class="bottombar" aria-label="Menu">
      <button id="searchToggleBtn" class="btn btn-ghost" type="button">تلاش</button>
      <div id="searchWrap" class="search-wrap hidden" role="group" aria-label="Search input">
        <input id="searchInput" type="search" placeholder="نام..." autocomplete="off" />
        <button id="searchClearBtn" class="btn btn-ghost btn-xs" type="button">صاف کریں</button>
      </div>

      <div class="spacer"></div>

      <div class="group" role="group" aria-label="Zoom">
        <button id="zoomOutBtn" class="btn btn-ghost btn-xs" type="button">-</button>
        <label class="zoom-inline">
          <span>Zoom</span>
          <input id="zoomRange" type="range" min="60" max="140" value="100" />
        </label>
        <button id="zoomInBtn" class="btn btn-ghost btn-xs" type="button">+</button>
        <button id="zoomResetBtn" class="btn btn-ghost btn-xs" type="button">ری سیٹ</button>
      </div>

      <button id="themeToggleBtn" class="btn btn-ghost" type="button">تھیم</button>
      <button id="expandAllBtn" class="btn" type="button">کھول دیں</button>
      <button id="collapseAllBtn" class="btn btn-ghost" type="button">بند کریں</button>
    </nav>

    <div id="detailsModal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Person details">
      <div class="modal-backdrop" data-close="1"></div>
      <div class="modal-card" role="document">
        <div class="modal-head">
          <div id="modalTitle" class="modal-title">تفصیلات</div>
          <button id="closeModalBtn" class="btn btn-ghost btn-xs" type="button">بند کریں</button>
        </div>
        <div id="details" class="details empty">کسی شخص کے کارڈ پر کلک کریں۔</div>
      </div>
    </div>

    <footer class="footer">
      <span>خاندانی درخت - سادہ HTML/CSS/JS سے بنایا گیا۔</span>
    </footer>

    <script src="./site.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
