<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ڈیزائن 1 - جدید حلقہ</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e22ce 100%);
            min-height: 100vh;
            padding: 40px 20px;
            direction: rtl;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h1 { text-align: center; color: #1e3c72; font-size: 3em; margin-bottom: 10px; }
        .back-btn {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            margin-bottom: 30px;
            transition: all 0.3s;
        }
        .back-btn:hover { background: #764ba2; }
        .tree-level {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 80px;
            flex-wrap: wrap;
        }
        .person-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }
        .person-circle:hover {
            transform: scale(1.15);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.25);
        }
        .level-1 .person-circle {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 160px;
            height: 160px;
        }
        .level-2 .person-circle {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .level-3 .person-circle {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        .person-name { font-size: 1em; font-weight: 700; margin-bottom: 5px; }
        .person-relation { font-size: 0.75em; opacity: 0.95; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← واپس جائیں</a>
        <h1>🎨 ڈیزائن 1: جدید حلقہ</h1>
        
        <div class="tree-level level-1">
            <div class="person-circle">
                <div class="person-name">احمد علی</div>
                <div class="person-relation">دادا جان 👴</div>
            </div>
        </div>

        <div class="tree-level level-2">
            <div class="person-circle">
                <div class="person-name">علی خان</div>
                <div class="person-relation">ابو 👨</div>
            </div>
            <div class="person-circle">
                <div class="person-name">محمد حسن</div>
                <div class="person-relation">چاچا 👨</div>
            </div>
            <div class="person-circle">
                <div class="person-name">فاطمہ خانم</div>
                <div class="person-relation">خالہ 👩</div>
            </div>
        </div>

        <div class="tree-level level-3">
            <div class="person-circle">
                <div class="person-name">احمد</div>
                <div class="person-relation">بھائی 👦</div>
            </div>
            <div class="person-circle">
                <div class="person-name">علیہ</div>
                <div class="person-relation">بہن 👧</div>
            </div>
            <div class="person-circle">
                <div class="person-name">حسن</div>
                <div class="person-relation">کزن 👦</div>
            </div>
            <div class="person-circle">
                <div class="person-name">عائشہ</div>
                <div class="person-relation">کزن 👧</div>
            </div>
        </div>
    </div>
</body>
</html>
