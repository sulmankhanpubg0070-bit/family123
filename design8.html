<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ڈیزائن 8 - 3D اثرات</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            direction: rtl;
            perspective: 1000px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 { text-align: center; color: white; margin-bottom: 40px; font-size: 2.5em; }
        .back-btn {
            display: inline-block;
            background: white;
            color: #667eea;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .level {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 80px;
            flex-wrap: wrap;
        }
        .card {
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            min-width: 160px;
            font-weight: 600;
            position: relative;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 
                0 10px 20px rgba(0, 0, 0, 0.1),
                0 20px 40px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }
        .card:hover {
            transform: translateY(-20px) rotateX(10deg) rotateY(-10deg);
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.3),
                0 50px 100px rgba(0, 0, 0, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }
        .card::before {
            content: '';
            position: absolute;
            top: -10px;
            right: 0;
            left: 0;
            height: 10px;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.8), transparent);
            border-radius: 15px 15px 0 0;
        }
        .name { font-size: 1.2em; margin-bottom: 8px; color: #667eea; }
        .relation { font-size: 0.9em; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← واپس جائیں</a>
        <h1>✨ ڈیزائن 8: 3D اثرات</h1>
        
        <div class="level">
            <div class="card">
                <div class="name">احمد علی</div>
                <div class="relation">دادا جان 👴</div>
            </div>
        </div>

        <div class="level">
            <div class="card">
                <div class="name">علی خان</div>
                <div class="relation">ابو 👨</div>
            </div>
            <div class="card">
                <div class="name">محمد حسن</div>
                <div class="relation">چاچا 👨</div>
            </div>
            <div class="card">
                <div class="name">فاطمہ خانم</div>
                <div class="relation">خالہ 👩</div>
            </div>
        </div>

        <div class="level">
            <div class="card">
                <div class="name">احمد</div>
                <div class="relation">بھائی 👦</div>
            </div>
            <div class="card">
                <div class="name">علیہ</div>
                <div class="relation">بہن 👧</div>
            </div>
            <div class="card">
                <div class="name">حسن</div>
                <div class="relation">کزن 👦</div>
            </div>
            <div class="card">
                <div class="name">عائشہ</div>
                <div class="relation">کزن 👧</div>
            </div>
        </div>
    </div>
</body>
</html>
