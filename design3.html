<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ڈیزائن 3 - درخت شاخیں</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            min-height: 100vh;
            padding: 40px 20px;
            direction: rtl;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
        }
        h1 { text-align: center; color: #00f2fe; margin-bottom: 40px; }
        .back-btn {
            display: inline-block;
            background: #00f2fe;
            color: #333;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            margin-bottom: 30px;
        }
        .tree {
            text-align: center;
        }
        .root {
            display: flex;
            justify-content: center;
            margin-bottom: 60px;
        }
        .node {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 20px 30px;
            border-radius: 50px;
            font-weight: 600;
            position: relative;
            min-width: 150px;
            box-shadow: 0 5px 20px rgba(79, 172, 254, 0.3);
        }
        .branches {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 60px;
            position: relative;
        }
        .branch {
            text-align: center;
        }
        .branch-line {
            width: 2px;
            height: 40px;
            background: #00f2fe;
            margin: 0 auto 20px;
        }
        .leaf {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            font-weight: 600;
            min-width: 120px;
            box-shadow: 0 5px 15px rgba(67, 233, 123, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← واپس جائیں</a>
        <h1>🌳 ڈیزائن 3: درخت شاخیں</h1>
        
        <div class="tree">
            <div class="root">
                <div class="node">احمد علی 👴</div>
            </div>

            <div class="branches">
                <div class="branch">
                    <div class="branch-line"></div>
                    <div class="node">علی خان 👨</div>
                </div>
                <div class="branch">
                    <div class="branch-line"></div>
                    <div class="node">محمد حسن 👨</div>
                </div>
                <div class="branch">
                    <div class="branch-line"></div>
                    <div class="node">فاطمہ خانم 👩</div>
                </div>
            </div>

            <div class="branches" style="gap: 20px;">
                <div class="branch">
                    <div class="branch-line"></div>
                    <div class="leaf">احمد 👦</div>
                </div>
                <div class="branch">
                    <div class="branch-line"></div>
                    <div class="leaf">علیہ 👧</div>
                </div>
                <div class="branch">
                    <div class="branch-line"></div>
                    <div class="leaf">حسن 👦</div>
                </div>
                <div class="branch">
                    <div class="branch-line"></div>
                    <div class="leaf">عائشہ 👧</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
